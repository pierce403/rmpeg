name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg hyperfine libxml2-dev make pkg-config python3 rsync

      - name: Build generated site
        env:
          RMPEG_FFPROBE: .cache/ffmpeg/ffprobe-build/ffprobe
          RMPEG_FATE_RSYNC_OPTIONS: "-rltLW --timeout=60"
        run: |
          cargo xtask samples
          cargo xtask reference
          cargo xtask fate-mini
          cargo xtask ffprobe-oracle
          cargo xtask ffmpeg-samples
          cargo xtask bench
          cargo xtask site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
